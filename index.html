<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikah | Andi & Oumaima</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#fdfbf7;
    overflow:hidden;
}

/* ================= GOLD ================= */
.gold{ color:#C6A75E; }

.divider{
    width:70px;
    height:2px;
    background:#C6A75E;
    margin:30px auto;
}

/* ================= ENVELOPE ================= */
.seal-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#fdfbf7;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    transition:1.5s ease;
}

.envelope{
    position:relative;
    width:360px;
    height:220px;
    background:#ffffff;
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
    perspective:1000px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#f7f3ec;
    clip-path:polygon(0 0,100% 0,50% 70%);
    transform-origin:top;
    transition:1.5s cubic-bezier(.77,0,.18,1);
    z-index:3;
}

.letter{
    position:absolute;
    width:90%;
    height:150px;
    background:#fff;
    top:35px;
    left:5%;
    text-align:center;
    padding-top:50px;
    font-family:'Playfair Display',serif;
    font-size:18px;
    letter-spacing:4px;
    color:#C6A75E;
    transform:translateY(40px);
    transition:1.6s ease;
    z-index:1;
}

.seal{
    position:absolute;
    width:85px;
    height:85px;
    background:radial-gradient(circle at 30% 30%, #d64545, #7a0000);
    border-radius:50%;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:4;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    transition:.3s;
}
.seal:active{ transform:translate(-50%,-50%) scale(0.92); }

.monogram{
    font-family:'Great Vibes',cursive;
    font-size:30px;
    color:#f3d58a;
}

.open .flap{ transform:rotateX(180deg); }
.open .letter{ transform:translateY(-120px); }

.fade-out{
    opacity:0;
    transform:scale(1.03);
}

/* ================= INVITATION ================= */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
    opacity:0;
    transform:translateY(60px);
    transition:1.2s ease;
}

.reveal{
    opacity:1;
    transform:translateY(0);
}

.invitation{
    width:100%;
    max-width:700px;
    text-align:center;
}

.top-text{
    font-family:'Playfair Display',serif;
    letter-spacing:6px;
    font-size:18px;
    margin-bottom:50px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:85px;
    margin-bottom:40px;
}

.date{
    font-family:'Playfair Display',serif;
    font-size:22px;
    letter-spacing:8px;
    margin-bottom:15px;
}

.time{
    font-family:'Playfair Display',serif;
    font-size:18px;
    letter-spacing:4px;
    margin-bottom:40px;
}

.body-text{
    font-size:18px;
    line-height:1.8;
    margin-top:40px;
}

.address{
    margin-top:40px;
    font-size:16px;
    letter-spacing:2px;
}

/* Map Button */
.map-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 28px;
    border:1px solid #C6A75E;
    color:#C6A75E;
    text-decoration:none;
    letter-spacing:3px;
    transition:.3s;
}
.map-btn:hover{
    background:#C6A75E;
    color:white;
}

/* ================= FLOATING PETALS ================= */
.petal{
    position:fixed;
    top:-50px;
    width:15px;
    height:20px;
    background:radial-gradient(circle at 30% 30%, #f8d7da, #e9a1b0);
    border-radius:50% 50% 50% 0;
    opacity:0.7;
    transform:rotate(45deg);
    animation:fall linear infinite;
}

@keyframes fall{
    0%{ transform:translateY(-50px) rotate(0deg); }
    100%{ transform:translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- ENTRANCE -->
<div class="seal-screen" id="sealScreen">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">NIKAH INVITATION</div>
        <div class="seal" onclick="openEnvelope()">
            <div class="monogram">A & O</div>
        </div>
    </div>
</div>

<!-- INVITATION -->
<div class="wrapper" id="mainContent">
<div class="invitation">

    <div class="top-text gold">In the Name of Allah</div>

    <div class="names gold">Andi & Oumaima</div>

    <div class="date gold">04 • 04 • 2026</div>
    <div class="time gold">5:00 PM</div>

    <div class="divider"></div>

    <div class="body-text">
        With gratitude and joy, we invite you to witness and celebrate
        our Nikah ceremony.
    </div>

    <div class="address gold">
        319 Broadway<br>
        Arlington, MA 02474
    </div>

    <a class="map-btn"
       href="https://www.google.com/maps/search/?api=1&query=319+Broadway,+Arlington,+MA+02474"
       target="_blank">
       VIEW MAP
    </a>

</div>
</div>

<audio id="sealSound" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-flutter-482.mp3"></audio>

<script>
function openEnvelope(){
    const envelope=document.getElementById("envelope");
    const screen=document.getElementById("sealScreen");
    const main=document.getElementById("mainContent");
    const sound=document.getElementById("sealSound");
    const music=document.getElementById("bgMusic");

    sound.play();
    music.play();

    envelope.classList.add("open");

    setTimeout(()=>{
        screen.classList.add("fade-out");
    },1500);

    setTimeout(()=>{
        screen.style.display="none";
        document.body.style.overflow="auto";
        main.classList.add("reveal");
        createPetals();
    },2200);
}

/* Floating petals generator */
function createPetals(){
    for(let i=0;i<15;i++){
        let petal=document.createElement("div");
        petal.classList.add("petal");
        petal.style.left=Math.random()*100+"vw";
        petal.style.animationDuration=(5+Math.random()*5)+"s";
        petal.style.animationDelay=Math.random()*5+"s";
        document.body.appendChild(petal);
    }
}
</script>
<audio id="bgMusic" loop>
  <source src="love-story.mp3" type="audio/mpeg">
</audio>
</body>
</html>
