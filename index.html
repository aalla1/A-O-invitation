<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikah | Andi & Oumaima</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f6f2eb;
    overflow:hidden;
}

/* GOLD */
.gold{ color:#C6A75E; }

.divider{
    width:70px;
    height:2px;
    background:#C6A75E;
    margin:30px auto;
}

/* ================= REALISTIC ENVELOPE ================= */
.seal-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#f6f2eb;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    transition:1.5s ease;
}

.envelope{
    position:relative;
    width:400px;
    height:260px;
    background:linear-gradient(145deg,#ffffff,#f3efe8);
    box-shadow:
        0 25px 50px rgba(0,0,0,0.15),
        inset 0 2px 8px rgba(0,0,0,0.05);
    perspective:1000px;
    border-radius:6px;
}

/* Flap */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#faf7f1,#eae5dc);
    clip-path:polygon(0 0,100% 0,50% 75%);
    transform-origin:top;
    transition:1.6s cubic-bezier(.77,0,.18,1);
    z-index:3;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* Letter */
.letter{
    position:absolute;
    width:90%;
    height:180px;
    background:white;
    top:60px;   /* MOVED LOWER */
    left:5%;
    text-align:center;
    padding-top:70px;
    font-family:'Playfair Display',serif;
    font-size:22px;
    letter-spacing:6px;
    color:#C6A75E;
    transform:translateY(40px);
    transition:1.6s ease;
    z-index:1;
    box-shadow:0 15px 25px rgba(0,0,0,0.05);
}

/* Wax Seal */
.seal{
    position:absolute;
    width:90px;
    height:90px;
    background:radial-gradient(circle at 30% 30%, #d84c4c, #7a0000);
    border-radius:50%;
    top:62%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:4;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:
        0 8px 20px rgba(0,0,0,0.3),
        inset 0 4px 8px rgba(255,255,255,0.3);
    transition:.3s;
}

.seal:active{
    transform:translate(-50%,-50%) scale(0.92);
}

.monogram{
    font-family:'Great Vibes',cursive;
    font-size:36px;
    color:#f3d58a;
    text-shadow:0 2px 3px rgba(0,0,0,0.3);
}

/* Animation */
.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-150px);
}

.fade-out{
    opacity:0;
    transform:scale(1.03);
}

/* ================= INVITATION ================= */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
    opacity:0;
    transform:translateY(60px);
    transition:1.2s ease;
}

.reveal{
    opacity:1;
    transform:translateY(0);
}

.invitation{
    width:100%;
    max-width:700px;
    text-align:center;
}

.top-text{
    font-family:'Playfair Display',serif;
    letter-spacing:6px;
    font-size:18px;
    margin-bottom:50px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:90px; /* Bigger A */
    margin-bottom:40px;
}

.date{
    font-family:'Playfair Display',serif;
    font-size:22px;
    letter-spacing:8px;
    margin-bottom:15px;
}

.time{
    font-family:'Playfair Display',serif;
    font-size:18px;
    letter-spacing:4px;
    margin-bottom:40px;
}

.body-text{
    font-size:18px;
    line-height:1.8;
    margin-top:40px;
}

.address{
    margin-top:40px;
    font-size:16px;
    letter-spacing:2px;
}

.map-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 28px;
    border:1px solid #C6A75E;
    color:#C6A75E;
    text-decoration:none;
    letter-spacing:3px;
    transition:.3s;
}

.map-btn:hover{
    background:#C6A75E;
    color:white;
}

/* Petals */
.petal{
    position:fixed;
    top:-50px;
    width:15px;
    height:20px;
    background:radial-gradient(circle at 30% 30%, #f8d7da, #e9a1b0);
    border-radius:50% 50% 50% 0;
    opacity:0.7;
    transform:rotate(45deg);
    animation:fall linear infinite;
}

@keyframes fall{
    0%{ transform:translateY(-50px) rotate(0deg); }
    100%{ transform:translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="seal-screen" id="sealScreen">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">YOU ARE INVITED</div>
        <div class="seal" onclick="openEnvelope()">
            <div class="monogram">A & O</div>
        </div>
    </div>
</div>

<!-- INVITATION -->
<div class="wrapper" id="mainContent">
<div class="invitation">

    <div class="top-text gold">“And We created you in pairs.”<br>78:8) </div>
    <div class="names gold">Andi & Oumaima</div>

    <div class="date gold">03 • 04 • 2026</div>
    <div class="time gold">5:00 PM</div>

    <div class="divider"></div>

    <div class="body-text">
        With gratitude and joy, we invite you to witness and celebrate
        our Nikah ceremony.
    </div>

    <div class="address gold">
        Spinelli's Function Facility<br>
        10 Newbury St<br>
        Peabody, MA 01960
    </div>

    <a class="map-btn"
       href="https://www.google.com/maps/search/?api=1&query=Spinelli's+Function+Facility,+10+Newbury+St,+Peabody,+MA+01960"
       target="_blank">
       VIEW MAP
    </a>

</div>
</div>

<audio id="sealSound" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-flutter-482.mp3"></audio>

<script>
function openEnvelope(){
    const envelope=document.getElementById("envelope");
    const screen=document.getElementById("sealScreen");
    const main=document.getElementById("mainContent");
    const sound=document.getElementById("sealSound");

    sound.play();
    envelope.classList.add("open");

    setTimeout(()=>{
        screen.classList.add("fade-out");
    },1600);

    setTimeout(()=>{
        screen.style.display="none";
        document.body.style.overflow="auto";
        main.classList.add("reveal");
        createPetals();
    },2300);
}

function createPetals(){
    for(let i=0;i<15;i++){
        let petal=document.createElement("div");
        petal.classList.add("petal");
        petal.style.left=Math.random()*100+"vw";
        petal.style.animationDuration=(5+Math.random()*5)+"s";
        petal.style.animationDelay=Math.random()*5+"s";
        document.body.appendChild(petal);
    }
}
</script>

</body>
</html>
