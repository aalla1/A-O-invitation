<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andi ❤️ Oumaima</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0f0f12;
    overflow:hidden;
    font-family:'Playfair Display',serif;
}

/* Cinematic Container */
.cinematic-wrapper{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    animation:slowZoom 25s ease-in-out infinite alternate;
}

@keyframes slowZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
}

/* Soft vignette */
.vignette{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    z-index:3;
}

/* Countries */
.country{
    position:absolute;
    width:450px;
    filter: drop-shadow(0 25px 50px rgba(0,0,0,0.6));
    animation:float 6s ease-in-out infinite;
    z-index:1;
}

.albania{
    left:8%;
    top:35%;
}

.morocco{
    right:8%;
    top:32%;
}

@keyframes float{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-20px); }
    100%{ transform:translateY(0px); }
}

/* SVG Connection */
.connection-svg{
    position:absolute;
    width:100%;
    height:100%;
    z-index:2;
    pointer-events:none;
}

/* Gold Gradient */
#goldLine{
    stroke-dasharray:3000;
    stroke-dashoffset:3000;
    filter: drop-shadow(0 0 25px rgba(255,215,130,0.9));
    animation:drawLine 4s ease forwards 1s;
}

@keyframes drawLine{
    to{ stroke-dashoffset:0; }
}

/* Heart Pulse */
#heart{
    transform-origin:center;
    animation:heartPulse 3s infinite ease-in-out 5s;
    filter: drop-shadow(0 0 30px rgba(255,215,130,1));
}

@keyframes heartPulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.3); }
    100%{ transform:scale(1); }
}

/* Glow dot */
#glowDot{
    filter: drop-shadow(0 0 15px #FFD700);
}

/* Spark Particles */
.spark{
    position:absolute;
    width:4px;
    height:4px;
    background:#FFD700;
    border-radius:50%;
    opacity:0.8;
    animation:rise linear infinite;
}

@keyframes rise{
    0%{ transform:translateY(0); opacity:0; }
    20%{ opacity:1; }
    100%{ transform:translateY(-100vh); opacity:0; }
}

/* Center Names */
.center-text{
    position:absolute;
    width:100%;
    text-align:center;
    top:15%;
    color:#F5E6B3;
    z-index:4;
}

.center-text h1{
    font-family:'Great Vibes',cursive;
    font-size:90px;
    margin-bottom:20px;
}

.center-text p{
    font-size:24px;
    letter-spacing:5px;
}
</style>
</head>

<body>

<div class="cinematic-wrapper">

    <div class="vignette"></div>

    <!-- Countries -->
    <img src="albania.png" class="country albania">
    <img src="morocco.png" class="country morocco">

    <!-- Center Names -->
    <div class="center-text">
        <h1>Andi & Oumaima</h1>
        <p>04 • 04 • 2026 • 5:00 PM</p>
    </div>

    <!-- SVG Connection -->
    <svg class="connection-svg" viewBox="0 0 1600 900">

        <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#C6A75E"/>
                <stop offset="50%" stop-color="#F5E6B3"/>
                <stop offset="100%" stop-color="#C6A75E"/>
            </linearGradient>
        </defs>

        <path id="goldLine"
              d="M600 500 C850 200, 1050 200, 1300 480"
              fill="none"
              stroke="url(#goldGradient)"
              stroke-width="10"
              stroke-linecap="round"/>

        <circle id="glowDot" r="12" fill="#F5E6B3"/>

        <path id="heart"
              d="M950 260
                 C900 180, 800 180, 800 300
                 C800 380, 950 480, 950 480
                 C950 480, 1100 380, 1100 300
                 C1100 180, 1000 180, 950 260 Z"
              fill="url(#goldGradient)"/>

    </svg>

</div>

<audio id="bgMusic" loop>
  <source src="romantic.mp3" type="audio/mpeg">
</audio>

<script>
const path = document.getElementById("goldLine");
const glowDot = document.getElementById("glowDot");
const music = document.getElementById("bgMusic");

const length = path.getTotalLength();
let progress = 0;

function animateGlow(){
    progress += 5;
    if(progress > length) progress = 0;
    const point = path.getPointAtLength(progress);
    glowDot.setAttribute("cx", point.x);
    glowDot.setAttribute("cy", point.y);
    requestAnimationFrame(animateGlow);
}

setTimeout(()=>{ animateGlow(); },2000);

/* Sparks */
function createSparks(){
    const container = document.querySelector(".cinematic-wrapper");
    for(let i=0;i<60;i++){
        let spark=document.createElement("div");
        spark.classList.add("spark");
        spark.style.left=Math.random()*100+"%";
        spark.style.bottom="-20px";
        spark.style.animationDuration=(6+Math.random()*6)+"s";
        spark.style.animationDelay=Math.random()*5+"s";
        container.appendChild(spark);
    }
}
createSparks();

/* Fade-in Music */
function startMusic(){
    music.volume = 0;
    music.play();
    let fade = setInterval(()=>{
        if(music.volume < 0.6){
            music.volume += 0.02;
        } else clearInterval(fade);
    },200);
}
startMusic();
</script>

</body>
</html>
