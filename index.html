<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikah | Andi & Oumaima</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:#fdfbf7;
    color:#1a1a1a;
    overflow:hidden;
}

/* ================= GOLD ================= */
.gold{
    color:#C6A75E;
}
.gold-line{
    width:80px;
    height:2px;
    background:#C6A75E;
    margin:40px auto;
}

/* ================= ENVELOPE ENTRANCE ================= */
.seal-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#fdfbf7;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    transition:1.5s ease;
}

.envelope{
    position:relative;
    width:360px;
    height:220px;
    background:#ffffff;
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
    perspective:1000px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#f7f3ec;
    clip-path:polygon(0 0,100% 0,50% 70%);
    transform-origin:top;
    transition:1.5s cubic-bezier(.77,0,.18,1);
    z-index:3;
}

.letter{
    position:absolute;
    width:90%;
    height:150px;
    background:#fff;
    top:35px;
    left:5%;
    text-align:center;
    padding-top:50px;
    font-family:'Playfair Display',serif;
    font-size:18px;
    letter-spacing:4px;
    color:#C6A75E;
    transform:translateY(40px);
    transition:1.6s ease;
    z-index:1;
}

.seal{
    position:absolute;
    width:85px;
    height:85px;
    background:radial-gradient(circle at 30% 30%, #d64545, #7a0000);
    border-radius:50%;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:4;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    transition:.3s;
}
.seal:active{
    transform:translate(-50%,-50%) scale(0.92);
}
.monogram{
    font-family:'Great Vibes',cursive;
    font-size:30px;
    color:#f3d58a;
}

/* Open animation */
.open .flap{
    transform:rotateX(180deg);
}
.open .letter{
    transform:translateY(-120px);
}
.fade-out{
    opacity:0;
    transform:scale(1.03);
}

/* ================= MAIN CONTENT ================= */
.section{
    padding:140px 20px;
    text-align:center;
    max-width:900px;
    margin:auto;
    opacity:0;
    transform:translateY(60px);
    transition:1.2s ease;
}
.reveal{
    opacity:1;
    transform:translateY(0);
}

.top-text{
    font-family:'Playfair Display',serif;
    letter-spacing:6px;
    font-size:20px;
    margin-bottom:60px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:90px;
    margin-bottom:50px;
}

.date{
    font-family:'Playfair Display',serif;
    font-size:28px;
    letter-spacing:8px;
    margin-bottom:40px;
}

.body-text{
    max-width:650px;
    margin:50px auto;
    font-size:20px;
    line-height:1.8;
}

.address{
    margin-top:40px;
    font-size:18px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<!-- ENTRANCE -->
<div class="seal-screen" id="sealScreen">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">NIKAH INVITATION</div>
        <div class="seal" onclick="openEnvelope()">
            <div class="monogram">A & O</div>
        </div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="section" id="mainContent">
    <div class="top-text gold">In the Name of Allah</div>

    <div class="names gold">Andi & Oumaima</div>

    <div class="date gold">04 • 04 • 2026</div>

    <div class="gold-line"></div>

    <div class="body-text">
        With gratitude and joy, we invite you to witness and celebrate
        our Nikah ceremony.
    </div>

    <div class="address gold">
        319 Broadway<br>
        Arlington, MA 02474
    </div>
</div>

<script>
function openEnvelope(){
    const envelope=document.getElementById("envelope");
    const screen=document.getElementById("sealScreen");

    envelope.classList.add("open");

    setTimeout(()=>{
        screen.classList.add("fade-out");
    },1500);

    setTimeout(()=>{
        screen.style.display="none";
        document.body.style.overflow="auto";
        reveal();
        window.addEventListener("scroll",reveal);
    },2200);
}

function reveal(){
    const sec=document.getElementById("mainContent");
    const top=sec.getBoundingClientRect().top;
    if(top < window.innerHeight-120){
        sec.classList.add("reveal");
    }
}
</script>

</body>
</html>
