*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f6f2eb;

/* GOLD */
.gold{ color:#C6A75E; }

.divider{
    width:70px;
    height:2px;
    background:#C6A75E;
    margin:30px auto;
}

/* ================= REALISTIC ENVELOPE ================= */
.seal-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#f6f2eb;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    transition:1.5s ease;
}

.envelope{
    position:relative;
    width:400px;
    height:260px;
    background:linear-gradient(145deg,#ffffff,#f3efe8);
    box-shadow:
        0 25px 50px rgba(0,0,0,0.15),
        inset 0 2px 8px rgba(0,0,0,0.05);
    perspective:1000px;
    border-radius:6px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#faf7f1,#eae5dc);
    clip-path:polygon(0 0,100% 0,50% 75%);
    transform-origin:top;
    transition:1.6s cubic-bezier(.77,0,.18,1);
    z-index:3;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}
